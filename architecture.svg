<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 970" font-family="Inter, Arial, sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#374151"/>
    </marker>
    <marker id="arrAux" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0ea5e9"/>
    </marker>
    <marker id="arrData" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#a855f7"/>
    </marker>
    <linearGradient id="vpcgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <style>
      .title    { font-size: 18px; font-weight: 700; fill: #111827; }
      .subtitle { font-size: 11px; fill: #6b7280; }
      .lbl      { font-size: 12px; fill: #1f2937; }
      .lbl-b    { font-size: 12px; fill: #1f2937; font-weight: 700; }
      .small    { font-size: 11px; fill: #4b5563; }
      .container-lbl { font-size: 10px; fill: #4b5563; }
      .vpc-lbl  { font-size: 12px; fill: #1e3a8a; font-weight: 700; }
      .az-lbl   { font-size: 10px; fill: #475569; }
      .pub-lbl  { font-size: 10px; fill: #78350f; }
      .priv-lbl { font-size: 10px; fill: #155e75; }
      .vpn-lbl  { font-size: 11px; fill: #7f1d1d; }
      .svc-lbl  { font-size: 11px; fill: #14532d; }
      .db-lbl   { font-size: 11px; fill: #581c87; }
      .iam-lbl  { font-size: 11px; fill: #312e81; }
      .ms-lbl   { font-size: 11px; fill: #0c4a6e; }
      .edge-lbl { font-size: 10px; fill: #374151; }
      .edge-aux { font-size: 10px; fill: #0c4a6e; }

      .acct  { fill: #fafafa; stroke: #9ca3af; stroke-width: 1; rx: 8; ry: 8; }
      .region{ fill: #ffffff; stroke: #9ca3af; stroke-width: 1; stroke-dasharray: 4,3; rx: 8; ry: 8; }
      .vpc   { fill: url(#vpcgrad); stroke: #2563eb; stroke-width: 1.5; stroke-dasharray: 6,4; rx: 12; ry: 12; }
      .az    { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 4,3; rx: 10; ry: 10; }
      .pub   { fill: #fef3c7; stroke: #f59e0b; stroke-width: 1; rx: 8; ry: 8; }
      .priv  { fill: #ecfeff; stroke: #06b6d4; stroke-width: 1; rx: 8; ry: 8; }
      .svc   { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; rx: 6; ry: 6; }
      .db    { fill: #fae8ff; stroke: #a855f7; stroke-width: 1.5; rx: 6; ry: 6; }
      .vpn   { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.5; rx: 6; ry: 6; }
      .iam   { fill: #e0e7ff; stroke: #4f46e5; stroke-width: 1.5; rx: 6; ry: 6; }
      .ms    { fill: #ffffff; stroke: #0ea5e9; stroke-width: 1.5; rx: 6; ry: 6; }
      .box   { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; rx: 8; ry: 8; }
      .nat   { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; rx: 6; ry: 6; }

      .arr      { stroke: #374151; stroke-width: 1.5; fill: none; }
      .arr-aux  { stroke: #0ea5e9; stroke-width: 1.5; fill: none; stroke-dasharray: 5,4; }
      .arr-data { stroke: #a855f7; stroke-width: 1.5; fill: none; stroke-dasharray: 5,4; }
    </style>
  </defs>

  <!-- Title -->
  <text x="40" y="36" class="title">Prime Service - AWS Reference Architecture</text>
  <text x="40" y="58" class="subtitle">VPC + Client VPN (mTLS)  |  ECS Fargate (private)  |  RDS Postgres Multi-AZ  |  ECR  |  CloudWatch  |  IaC via Terraform</text>

  <!-- Containers (drawn first, lower z-order) -->
  <rect x="300" y="90" width="1160" height="850" class="acct"/>
  <text x="312" y="108" class="container-lbl">AWS Account: atmos-platform</text>

  <rect x="320" y="120" width="1120" height="810" class="region"/>
  <text x="332" y="138" class="container-lbl">Region: eu-central-1</text>

  <rect x="340" y="150" width="820" height="770" class="vpc"/>
  <text x="356" y="170" class="vpc-lbl">VPC 10.50.0.0/16</text>

  <rect x="360" y="450" width="380" height="450" class="az"/>
  <text x="372" y="468" class="az-lbl">AZ eu-central-1a</text>

  <rect x="760" y="450" width="380" height="450" class="az"/>
  <text x="772" y="468" class="az-lbl">AZ eu-central-1b</text>

  <rect x="375" y="475" width="350" height="55" class="pub"/>
  <text x="550" y="492" class="pub-lbl" text-anchor="middle">Public subnet 10.50.0.0/20</text>

  <rect x="775" y="475" width="350" height="55" class="pub"/>
  <text x="950" y="492" class="pub-lbl" text-anchor="middle">Public subnet 10.50.16.0/20</text>

  <rect x="375" y="545" width="350" height="340" class="priv"/>
  <text x="550" y="562" class="priv-lbl" text-anchor="middle">Private subnet 10.50.32.0/20</text>

  <rect x="775" y="545" width="350" height="340" class="priv"/>
  <text x="950" y="562" class="priv-lbl" text-anchor="middle">Private subnet 10.50.48.0/20</text>

  <!-- External actors (left column) -->
  <rect x="60" y="200" width="200" height="80" class="box"/>
  <text x="160" y="225" class="lbl" text-anchor="middle">Operator / Developer</text>
  <text x="160" y="248" class="small" text-anchor="middle">AWS Client VPN client</text>
  <text x="160" y="264" class="small" text-anchor="middle">(mTLS .ovpn profile)</text>

  <rect x="60" y="350" width="200" height="120" class="iam"/>
  <text x="160" y="372" class="lbl" text-anchor="middle">IAM Identity Center</text>
  <text x="160" y="388" class="small" text-anchor="middle">(human access)</text>
  <text x="160" y="412" class="iam-lbl" text-anchor="middle">grp-developers (RO)</text>
  <text x="160" y="430" class="iam-lbl" text-anchor="middle">grp-devops</text>
  <text x="160" y="448" class="iam-lbl" text-anchor="middle">grp-admins</text>

  <!-- Top-of-VPC: Client VPN + Internet Gateway -->
  <rect x="380" y="190" width="320" height="80" class="vpn"/>
  <text x="540" y="214" class="lbl-b" text-anchor="middle">AWS Client VPN</text>
  <text x="540" y="234" class="vpn-lbl" text-anchor="middle">10.60.0.0/22 pool   |   UDP/443 mTLS</text>
  <text x="540" y="252" class="vpn-lbl" text-anchor="middle">Connection logs &gt; CloudWatch</text>

  <rect x="970" y="195" width="170" height="36" class="nat"/>
  <text x="1055" y="218" class="small" text-anchor="middle">Internet Gateway</text>

  <!-- Internal ALB (cross-AZ) -->
  <rect x="380" y="340" width="760" height="70" class="svc"/>
  <text x="760" y="365" class="lbl-b" text-anchor="middle">Internal Application Load Balancer (cross-AZ)</text>
  <text x="760" y="386" class="svc-lbl" text-anchor="middle">scheme = internal     listener :80 / :443</text>

  <!-- Public-subnet residents (NAT GWs only) -->
  <rect x="395" y="495" width="130" height="28" class="nat"/>
  <text x="460" y="513" class="small" text-anchor="middle">NAT Gateway</text>

  <rect x="985" y="495" width="125" height="28" class="nat"/>
  <text x="1047" y="513" class="small" text-anchor="middle">NAT Gateway</text>

  <!-- ECS Fargate tasks -->
  <rect x="430" y="600" width="240" height="60" class="svc"/>
  <text x="550" y="624" class="lbl-b" text-anchor="middle">ECS Fargate task</text>
  <text x="550" y="644" class="svc-lbl" text-anchor="middle">FastAPI :8080</text>

  <rect x="830" y="600" width="240" height="60" class="svc"/>
  <text x="950" y="624" class="lbl-b" text-anchor="middle">ECS Fargate task</text>
  <text x="950" y="644" class="svc-lbl" text-anchor="middle">FastAPI :8080</text>

  <!-- RDS Postgres -->
  <rect x="430" y="780" width="240" height="65" class="db"/>
  <text x="550" y="805" class="lbl-b" text-anchor="middle">RDS Postgres (writer)</text>
  <text x="550" y="826" class="db-lbl" text-anchor="middle">primary, encrypted (KMS)</text>

  <rect x="830" y="780" width="240" height="65" class="db"/>
  <text x="950" y="805" class="lbl-b" text-anchor="middle">RDS Postgres (standby)</text>
  <text x="950" y="826" class="db-lbl" text-anchor="middle">Multi-AZ failover</text>

  <!-- Managed services (right column, outside VPC) -->
  <rect x="1240" y="200" width="200" height="80" class="ms"/>
  <text x="1340" y="224" class="lbl-b" text-anchor="middle">Amazon ECR</text>
  <text x="1340" y="246" class="ms-lbl" text-anchor="middle">prime-service repo</text>
  <text x="1340" y="262" class="ms-lbl" text-anchor="middle">immutable tags, scan-on-push</text>

  <rect x="1240" y="350" width="200" height="80" class="ms"/>
  <text x="1340" y="374" class="lbl-b" text-anchor="middle">Secrets Manager</text>
  <text x="1340" y="396" class="ms-lbl" text-anchor="middle">RDS master credentials</text>
  <text x="1340" y="412" class="ms-lbl" text-anchor="middle">auto-rotation</text>

  <rect x="1240" y="500" width="200" height="80" class="ms"/>
  <text x="1340" y="524" class="lbl-b" text-anchor="middle">CloudWatch Logs / Insights</text>
  <text x="1340" y="546" class="ms-lbl" text-anchor="middle">/aws/ecs, /aws/clientvpn,</text>
  <text x="1340" y="562" class="ms-lbl" text-anchor="middle">/aws/vpc/flow-logs</text>

  <!-- Edges - orthogonal, linear, no object crossings -->

  <!-- 1) Operator -> Client VPN -->
  <path d="M 260,240 L 320,240 L 320,230 L 380,230" class="arr" marker-end="url(#arr)"/>
  <text x="288" y="232" class="edge-lbl" text-anchor="middle">UDP/443 mTLS</text>

  <!-- 2) Client VPN -> ALB -->
  <path d="M 540,270 L 540,305 L 570,305 L 570,340" class="arr" marker-end="url(#arr)"/>
  <text x="600" y="302" class="edge-lbl">authorized to VPC CIDR</text>

  <!-- 3) ALB -> ECS-a (vertical lane, drops down past public subnet, jogs left into private) -->
  <path d="M 570,410 L 570,505 L 550,505 L 550,600" class="arr" marker-end="url(#arr)"/>

  <!-- 4) ALB -> ECS-b (straight vertical, lane at x=950 leaves NAT-b clear on the right) -->
  <path d="M 950,410 L 950,600" class="arr" marker-end="url(#arr)"/>

  <!-- 5) ECS-a -> RDS-a -->
  <path d="M 550,660 L 550,780" class="arr" marker-end="url(#arr)"/>
  <text x="572" y="724" class="edge-lbl">5432</text>

  <!-- 6) ECS-b -> RDS-b (failover, dashed) -->
  <path d="M 950,660 L 950,780" class="arr-data" marker-end="url(#arrData)"/>
  <text x="977" y="724" class="edge-aux">5432 (failover)</text>

  <!-- 7) RDS-a -> RDS-b (sync replication) -->
  <path d="M 670,812 L 830,812" class="arr-data" marker-end="url(#arrData)"/>
  <text x="750" y="806" class="edge-aux" text-anchor="middle">sync replication</text>

  <!-- 8) ECR -> ECS-b (image pull, lane at x=1175) -->
  <path d="M 1240,240 L 1175,240 L 1175,618 L 1070,618" class="arr-aux" marker-end="url(#arrAux)"/>
  <text x="1207" y="234" class="edge-aux" text-anchor="middle">image pull</text>

  <!-- 9) Secrets Manager -> ECS-b (DATABASE_URL, lane at x=1195) -->
  <path d="M 1240,390 L 1195,390 L 1195,642 L 1070,642" class="arr-aux" marker-end="url(#arrAux)"/>
  <text x="1217" y="384" class="edge-aux" text-anchor="middle">DATABASE_URL</text>

  <!-- 10) ECS-b -> CloudWatch (logs out, lane at x=1215) -->
  <path d="M 1070,630 L 1215,630 L 1215,540 L 1240,540" class="arr-aux" marker-end="url(#arrAux)"/>
  <text x="1142" y="624" class="edge-aux" text-anchor="middle">structured logs</text>

  <!-- Legend -->
  <rect x="60" y="700" width="220" height="220" class="box"/>
  <text x="72" y="720" class="lbl-b">Legend</text>

  <rect x="75" y="730" width="16" height="16" class="pub"/>
  <text x="100" y="743" class="small">public subnet</text>

  <rect x="75" y="755" width="16" height="16" class="priv"/>
  <text x="100" y="768" class="small">private subnet</text>

  <rect x="75" y="780" width="16" height="16" class="svc"/>
  <text x="100" y="793" class="small">compute (ALB / ECS)</text>

  <rect x="75" y="805" width="16" height="16" class="db"/>
  <text x="100" y="818" class="small">data (RDS)</text>

  <rect x="75" y="830" width="16" height="16" class="vpn"/>
  <text x="100" y="843" class="small">VPN ingress</text>

  <rect x="75" y="855" width="16" height="16" class="iam"/>
  <text x="100" y="868" class="small">identity</text>

  <rect x="75" y="880" width="16" height="16" class="ms"/>
  <text x="100" y="893" class="small">managed service</text>

  <line x1="160" y1="743" x2="174" y2="743" class="arr"/>
  <text x="180" y="747" class="small">network path</text>
  <line x1="160" y1="768" x2="174" y2="768" class="arr-aux"/>
  <text x="180" y="772" class="small">control / logs</text>
  <line x1="160" y1="793" x2="174" y2="793" class="arr-data"/>
  <text x="180" y="797" class="small">replication</text>
</svg>
