<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="Inter, Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#374151"/>
    </marker>
    <linearGradient id="vpcgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <style>
      .title { font-size: 18px; font-weight: 700; fill: #111827; }
      .subtitle { font-size: 12px; fill: #6b7280; }
      .lbl { font-size: 12px; fill: #1f2937; }
      .small { font-size: 11px; fill: #4b5563; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 8; ry: 8; }
      .vpc { fill: url(#vpcgrad); stroke: #2563eb; stroke-width: 1.5; stroke-dasharray: 6,4; rx: 12; ry: 12; }
      .az { fill: #f8fafc; stroke: #94a3b8; stroke-dasharray: 4,3; rx: 10; ry: 10; }
      .priv { fill: #ecfeff; stroke: #06b6d4; rx: 8; ry: 8; }
      .pub { fill: #fef3c7; stroke: #f59e0b; rx: 8; ry: 8; }
      .svc { fill: #dcfce7; stroke: #16a34a; rx: 6; ry: 6; }
      .db { fill: #fae8ff; stroke: #a855f7; rx: 6; ry: 6; }
      .vpn { fill: #fee2e2; stroke: #dc2626; rx: 6; ry: 6; }
      .iam { fill: #e0e7ff; stroke: #4f46e5; rx: 6; ry: 6; }
      .arr { stroke: #374151; stroke-width: 1.5; fill: none; }
      .dashed { stroke-dasharray: 5,4; }
    </style>
  </defs>

  <!-- Title -->
  <text x="40" y="38" class="title">Prime Service - AWS Reference Architecture</text>
  <text x="40" y="58" class="subtitle">VPC + Client VPN (mTLS) | ECS Fargate (private) | RDS Postgres | ECR | CloudWatch | IaC via Terraform</text>

  <!-- Operator -->
  <rect x="40" y="100" width="170" height="68" class="box"/>
  <text x="125" y="125" class="lbl" text-anchor="middle">Operator / Developer</text>
  <text x="125" y="142" class="small" text-anchor="middle">AWS Client VPN client</text>
  <text x="125" y="156" class="small" text-anchor="middle">(mTLS .ovpn profile)</text>

  <!-- IAM identity -->
  <rect x="40" y="200" width="170" height="80" class="iam"/>
  <text x="125" y="222" class="lbl" text-anchor="middle">IAM groups</text>
  <text x="125" y="240" class="small" text-anchor="middle">grp-developers (RO)</text>
  <text x="125" y="256" class="small" text-anchor="middle">grp-devops</text>
  <text x="125" y="272" class="small" text-anchor="middle">grp-admins</text>

  <!-- AWS account boundary -->
  <rect x="240" y="90" width="1010" height="640" fill="#fafafa" stroke="#9ca3af" stroke-width="1.2" rx="10" ry="10"/>
  <text x="255" y="110" class="small">AWS Account: atmos-platform</text>

  <!-- Region -->
  <rect x="260" y="125" width="975" height="585" fill="#ffffff" stroke="#9ca3af" stroke-dasharray="4,3" rx="8" ry="8"/>
  <text x="275" y="145" class="small">Region: eu-central-1</text>

  <!-- VPC -->
  <rect x="280" y="160" width="935" height="535" class="vpc"/>
  <text x="295" y="180" class="lbl" font-weight="700">VPC 10.50.0.0/16</text>

  <!-- Client VPN -->
  <rect x="300" y="195" width="190" height="78" class="vpn"/>
  <text x="395" y="218" class="lbl" text-anchor="middle">AWS Client VPN</text>
  <text x="395" y="236" class="small" text-anchor="middle">10.60.0.0/22 pool</text>
  <text x="395" y="250" class="small" text-anchor="middle">UDP/443 - mTLS</text>
  <text x="395" y="264" class="small" text-anchor="middle">Connection logs -> CloudWatch</text>

  <!-- AZ-a -->
  <rect x="300" y="295" width="430" height="380" class="az"/>
  <text x="315" y="315" class="small">AZ eu-central-1a</text>

  <!-- Public subnet AZ-a -->
  <rect x="315" y="325" width="400" height="60" class="pub"/>
  <text x="515" y="345" class="lbl" text-anchor="middle">Public subnet 10.50.0.0/20</text>
  <rect x="335" y="350" width="120" height="28" class="box"/>
  <text x="395" y="368" class="small" text-anchor="middle">NAT Gateway</text>
  <rect x="475" y="350" width="120" height="28" class="box"/>
  <text x="535" y="368" class="small" text-anchor="middle">Internet Gateway</text>

  <!-- Private subnet AZ-a -->
  <rect x="315" y="395" width="400" height="265" class="priv"/>
  <text x="515" y="415" class="lbl" text-anchor="middle">Private subnet 10.50.32.0/20</text>

  <rect x="340" y="430" width="160" height="56" class="svc"/>
  <text x="420" y="450" class="lbl" text-anchor="middle">Internal ALB</text>
  <text x="420" y="468" class="small" text-anchor="middle">scheme=internal, :80/:443</text>

  <rect x="340" y="500" width="160" height="56" class="svc"/>
  <text x="420" y="520" class="lbl" text-anchor="middle">ECS Fargate task</text>
  <text x="420" y="538" class="small" text-anchor="middle">FastAPI :8080</text>

  <rect x="525" y="500" width="170" height="56" class="db"/>
  <text x="610" y="520" class="lbl" text-anchor="middle">RDS Postgres (writer)</text>
  <text x="610" y="538" class="small" text-anchor="middle">primary, encrypted</text>

  <!-- AZ-b -->
  <rect x="745" y="295" width="430" height="380" class="az"/>
  <text x="760" y="315" class="small">AZ eu-central-1b</text>

  <!-- Public subnet AZ-b -->
  <rect x="760" y="325" width="400" height="60" class="pub"/>
  <text x="960" y="345" class="lbl" text-anchor="middle">Public subnet 10.50.16.0/20</text>

  <!-- Private subnet AZ-b -->
  <rect x="760" y="395" width="400" height="265" class="priv"/>
  <text x="960" y="415" class="lbl" text-anchor="middle">Private subnet 10.50.48.0/20</text>

  <rect x="785" y="430" width="160" height="56" class="svc"/>
  <text x="865" y="450" class="lbl" text-anchor="middle">ALB target (replica)</text>
  <text x="865" y="468" class="small" text-anchor="middle">cross-AZ</text>

  <rect x="785" y="500" width="160" height="56" class="svc"/>
  <text x="865" y="520" class="lbl" text-anchor="middle">ECS Fargate task</text>
  <text x="865" y="538" class="small" text-anchor="middle">FastAPI :8080</text>

  <rect x="970" y="500" width="180" height="56" class="db"/>
  <text x="1060" y="520" class="lbl" text-anchor="middle">RDS Postgres (standby)</text>
  <text x="1060" y="538" class="small" text-anchor="middle">Multi-AZ failover</text>

  <!-- ECR -->
  <rect x="970" y="200" width="190" height="78" class="box"/>
  <text x="1065" y="222" class="lbl" text-anchor="middle">Amazon ECR</text>
  <text x="1065" y="240" class="small" text-anchor="middle">prime-service repo</text>
  <text x="1065" y="256" class="small" text-anchor="middle">scan-on-push</text>
  <text x="1065" y="270" class="small" text-anchor="middle">immutable tags</text>

  <!-- Secrets Manager -->
  <rect x="760" y="200" width="190" height="78" class="box"/>
  <text x="855" y="222" class="lbl" text-anchor="middle">Secrets Manager</text>
  <text x="855" y="240" class="small" text-anchor="middle">RDS master creds</text>
  <text x="855" y="256" class="small" text-anchor="middle">auto rotation</text>

  <!-- CloudWatch -->
  <rect x="525" y="195" width="220" height="78" class="box"/>
  <text x="635" y="220" class="lbl" text-anchor="middle">CloudWatch Logs / Insights</text>
  <text x="635" y="238" class="small" text-anchor="middle">/aws/ecs, /aws/clientvpn,</text>
  <text x="635" y="252" class="small" text-anchor="middle">/aws/vpc/flow-logs</text>

  <!-- Arrows -->
  <!-- Operator -> Client VPN -->
  <path d="M210,134 C 250,134 270,234 300,234" class="arr" marker-end="url(#arr)"/>
  <text x="240" y="155" class="small">UDP/443 mTLS</text>

  <!-- Client VPN -> ALB -->
  <path d="M395,273 C 395,360 420,400 420,430" class="arr" marker-end="url(#arr)"/>
  <text x="430" y="320" class="small">authorized to VPC CIDR</text>

  <!-- ALB -> tasks -->
  <path d="M420,486 L420,500" class="arr" marker-end="url(#arr)"/>
  <path d="M500,458 C 700,458 700,520 785,520" class="arr dashed" marker-end="url(#arr)"/>

  <!-- task -> RDS -->
  <path d="M500,528 L525,528" class="arr" marker-end="url(#arr)"/>
  <text x="495" y="520" class="small">5432</text>

  <!-- RDS Multi-AZ replication -->
  <path d="M695,528 L970,528" class="arr dashed" marker-end="url(#arr)"/>
  <text x="820" y="522" class="small" text-anchor="middle">sync replication</text>

  <!-- ECS pulls from ECR -->
  <path d="M980,278 C 900,360 700,420 500,440" class="arr dashed" marker-end="url(#arr)"/>
  <text x="900" y="320" class="small">image pull</text>

  <!-- Secrets to ECS task -->
  <path d="M855,278 C 800,360 600,440 500,510" class="arr dashed" marker-end="url(#arr)"/>
  <text x="780" y="350" class="small">DATABASE_URL secret</text>

  <!-- Logs out -->
  <path d="M420,556 C 420,640 600,640 635,275" class="arr dashed" marker-end="url(#arr)"/>
  <text x="500" y="660" class="small">structured JSON logs</text>

  <!-- Legend -->
  <rect x="40" y="320" width="200" height="200" class="box"/>
  <text x="50" y="340" class="lbl" font-weight="700">Legend</text>
  <rect x="50" y="350" width="14" height="14" class="pub"/><text x="72" y="362" class="small">public subnet</text>
  <rect x="50" y="372" width="14" height="14" class="priv"/><text x="72" y="384" class="small">private subnet</text>
  <rect x="50" y="394" width="14" height="14" class="svc"/><text x="72" y="406" class="small">compute</text>
  <rect x="50" y="416" width="14" height="14" class="db"/><text x="72" y="428" class="small">data</text>
  <rect x="50" y="438" width="14" height="14" class="vpn"/><text x="72" y="450" class="small">VPN ingress</text>
  <rect x="50" y="460" width="14" height="14" class="iam"/><text x="72" y="472" class="small">identity</text>
  <line x1="50" y1="490" x2="64" y2="490" class="arr"/><text x="72" y="494" class="small">network path</text>
  <line x1="50" y1="506" x2="64" y2="506" class="arr dashed"/><text x="72" y="510" class="small">control / logs</text>
</svg>
